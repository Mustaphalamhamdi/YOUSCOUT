version: '3.8'

services:

  # ── PostgreSQL — two logical databases, one instance ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: youscout-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: youscout
      POSTGRES_PASSWORD: youscout
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U youscout']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 — Discovery service feed projection ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: youscout-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka 3.x (KRaft — no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    container_name: youscout-kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MinIO — S3-compatible local object storage ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: youscout-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO init — creates the youscout-videos bucket ──────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/youscout-videos &&
      mc anonymous set download local/youscout-videos &&
      echo 'MinIO bucket ready'
      "

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  minio_data:
