server:
  port: 8081

spring:
  application:
    name: identity-profile-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/identity_db}
    username: ${DB_USER:youscout}
    password: ${DB_PASSWORD:youscout}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:youscout-mvp-dev-secret-change-in-production-must-be-256-bits}
  expiry-hours: 1

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
